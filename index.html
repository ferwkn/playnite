  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: #000; }
    body { margin: 0; color: white; font-family: system-ui, sans-serif; }
    .toolbar { position: sticky; z-index: 2; top: 0; display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 18px; background: rgba(0, 0, 0, .9); backdrop-filter: blur(12px); }
    button, input { min-height: 42px; border: 1px solid #202024; border-radius: 7px; color: #c9c9ce; background: rgba(18, 18, 20, .72); font: inherit; }
    button { padding: 9px 14px; cursor: pointer; }
    .search-box { position: relative; flex: 1 1 240px; min-width: 160px; }
    .search-box input { width: 100%; padding: 9px 42px 9px 12px; }
    .clear-search { position: absolute; top: 50%; right: 5px; display: none; width: 32px; min-height: 32px; padding: 0; border: 0; border-radius: 50%; color: #57575d; background: #18181c; transform: translateY(-50%); }
    .clear-search::before, .clear-search::after { position: absolute; top: 50%; left: 50%; width: 12px; height: 1px; content: ''; background: currentColor; transform-origin: center; }
    .clear-search::before { transform: translate(-50%, -50%) rotate(45deg); }
    .clear-search::after { transform: translate(-50%, -50%) rotate(-45deg); }
    .clear-search:hover, .clear-search:focus-visible { color: #85858d; background: #202025; }
    .clear-search.visible { display: flex; }
    input::placeholder { color: #707078; }
    button:hover, button:focus-visible, button[aria-pressed="true"], input:focus-visible { border-color: #484850; color: white; background: #18181c; outline: none; }
    main, .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 22px; padding: 22px; }
    .platform-group { grid-column: 1 / -1; }
    .platform-group h2 { margin: 10px 0 0; font-size: 20px; }
    .platform-group .platform-grid { padding: 14px 0 6px; }
    .cover { position: relative; z-index: 0; margin: 0; overflow: hidden; border-radius: 14px; background: #080808; aspect-ratio: 2 / 3; outline: none; isolation: isolate; transition: transform 220ms ease, box-shadow 220ms ease; }
    .cover img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform 220ms ease; }
    .cover figcaption { position: absolute; inset: 0; display: flex; align-items: end; padding: 18px 14px; color: white; font: 600 15px/1.2 system-ui, sans-serif; background: linear-gradient(to bottom, transparent 45%, rgba(0, 0, 0, .78) 100%); opacity: 0; transition: opacity 180ms ease; }
    .cover:not(.suppressed):hover, .cover.active, .cover:focus-visible { z-index: 1; transform: translateY(-5px) scale(1.04); box-shadow: 0 14px 30px rgba(0, 0, 0, .55); }
    .cover:not(.suppressed):hover img, .cover.active img, .cover:focus-visible img { transform: scale(1.025); }
    .cover:not(.suppressed):hover figcaption, .cover.active figcaption, .cover:focus-visible figcaption { opacity: 1; }
    .cover:focus-visible { box-shadow: 0 0 0 3px white; }
    .empty { grid-column: 1 / -1; padding: 50px 18px; color: #aaaab2; text-align: center; }
    @media (max-width: 600px) {
      .toolbar { padding: 10px; }
      button { flex: 1 1 auto; padding-inline: 10px; }
      .search-box { flex-basis: 100%; order: -1; }
      main, .platform-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 14px; padding: 14px; }
      .platform-group .platform-grid { padding: 10px 0 4px; }
      .platform-group h2 { font-size: 17px; }
      .cover { border-radius: 10px; }
      .cover figcaption { padding: 12px 9px; font-size: 13px; }
    }
    @media (prefers-reduced-motion: reduce) { .cover, .cover img, .cover figcaption { transition: none; } }
  </style>

      <img src="covers/8ea6b738144d4b62968f932125c6e068.webp" alt="Yoshi&#39;s Woolly World" loading="lazy" decoding="async">

      <img src="covers/de5da71d620047bea77b32baf91be58a.webp" alt="Zenless Zone Zero" loading="lazy" decoding="async">

    <figure class="cover" tabindex="0" data-name="Zero Escape: The Nonary Games" data-sort-name="Zero Escape: The Nonary Games" data-playtime="0" data-last-played="0" data-platform="PC (Windows)" data-year="2017" aria-label="Zero Escape: The Nonary Games, played 0h 0m, platform PC (Windows)">
      <img src="covers/00c51effbed34315a9e942a784a0f7eb.webp" alt="Zero Escape: The Nonary Games" loading="lazy" decoding="async">
      <figcaption>0h 0m</figcaption>
    </figure>
  </main>
  <script>
    const gallery = document.querySelector('#gallery');
    const localCards = [...gallery.querySelectorAll('.cover')];
    const search = document.querySelector('#search');
    const clearSearch = document.querySelector('#clear-search');
    const groupYear = document.querySelector('#group-year');
    const groupPlatform = document.querySelector('#group-platform');
    let cards = localCards;
    let sortKey = 'name';
    let sortDirection = 1;
    let groupMode = null;
    let searchQuery = '';
    let comparisonMode = false;
    let comparisonStatus = '';
    let comparisonRequest = 0;

    function compareCards(a, b) {
      if (sortKey === 'playtime') {
        return (Number(a.dataset.playtime) - Number(b.dataset.playtime)) * sortDirection;
      }
      if (sortKey === 'last-played') {
        return (Number(a.dataset.lastPlayed) - Number(b.dataset.lastPlayed)) * sortDirection;
      }
      return a.dataset.sortName.localeCompare(b.dataset.sortName, undefined, { sensitivity: 'base' }) * sortDirection;
    }

    function normalizeTitle(value) {
      return value.toLocaleLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\b(?:game of the year|goty|definitive|complete|ultimate|deluxe|gold|enhanced|anniversary|collector'?s|special)\s+edition\b/g, ' ')
        .replace(/\b(?:director'?s cut|remastered|remaster|remake)\b/g, ' ')
        .replace(/&/g, ' and ')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim()
        .replace(/\s+/g, ' ');
    }

    function similarity(left, right) {
      if (left === right) return 1;
      if (!left.length || !right.length) return 0;
      const previous = Array.from({ length: right.length + 1 }, (_, index) => index);
      for (let i = 1; i <= left.length; i++) {
        let diagonal = previous[0];
        previous[0] = i;
        for (let j = 1; j <= right.length; j++) {
          const above = previous[j];
          previous[j] = Math.min(
            previous[j] + 1,
            previous[j - 1] + 1,
            diagonal + (left[i - 1] === right[j - 1] ? 0 : 1));
          diagonal = above;
        }
      }
      return 1 - previous[right.length] / Math.max(left.length, right.length);
    }

    function titlesMatch(left, right) {
      const a = normalizeTitle(left);
      const b = normalizeTitle(right);
      if (a === b) return true;
      if (Math.min(a.length, b.length) < 8 || a.split(' ')[0] !== b.split(' ')[0]) return false;
      return similarity(a, b) >= .9;
    }

    function parseGalleryUrl(value) {
      const match = value.match(/^https:\/\/([a-z0-9-]+)\.github\.io\/([a-z0-9._-]+)\/?$/i);
      return match ? { owner: match[1], repository: match[2], url: value.endsWith('/') ? value : value + '/' } : null;
    }

    function createRemoteCard(game, galleryUrl) {
      const name = game.Name || game.name || '';
      const sortName = game.SortName || game.sortName || name;
      const imagePath = game.ImagePath || game.imagePath || '';
      const playtime = game.Playtime || game.playtime || '0h 0m';
      const card = document.createElement('figure');
      card.className = 'cover';
      card.tabIndex = 0;
      card.dataset.name = name;
      card.dataset.sortName = sortName;
      card.dataset.playtime = String(game.PlaytimeSeconds || game.playtimeSeconds || 0);
      card.dataset.lastPlayed = String(game.LastPlayed || game.lastPlayed || 0);
      card.dataset.platform = game.Platform || game.platform || 'Other';
      card.dataset.year = String(game.ReleaseYear || game.releaseYear || 'Unknown');
      card.setAttribute('aria-label', `${name}, played ${playtime}, platform ${card.dataset.platform}`);

      const image = document.createElement('img');
      image.src = new URL(imagePath, galleryUrl).href;
      image.alt = name;
      image.loading = 'lazy';
      image.decoding = 'async';
      const caption = document.createElement('figcaption');
      caption.textContent = playtime;
      card.append(image, caption);
      card.addEventListener('mouseleave', () => card.classList.remove('suppressed'));
      return card;
    }

    async function compareGallery(parsed) {
      const requestId = ++comparisonRequest;
      comparisonMode = true;
      comparisonStatus = 'Loading gallery...';
      cards = [];
      render();
      try {
        const apiUrl = `https://api.github.com/repos/${parsed.owner}/${parsed.repository}/contents/library.json`;
        const response = await fetch(apiUrl, { headers: { Accept: 'application/vnd.github+json' } });
        if (!response.ok) throw new Error('The gallery data could not be loaded.');
        const file = await response.json();
        const binary = atob((file.content || '').replace(/\s/g, ''));
        const bytes = Uint8Array.from(binary, character => character.charCodeAt(0));
        const remoteGames = JSON.parse(new TextDecoder().decode(bytes));
        if (requestId !== comparisonRequest) return;

        const localNames = localCards.map(card => card.dataset.name);
        const missing = remoteGames.filter(game =>
          !localNames.some(localName => titlesMatch(localName, game.Name || game.name || '')));
        cards = missing.map(game => createRemoteCard(game, parsed.url));
        comparisonStatus = '';
        render();
      } catch (error) {
        if (requestId !== comparisonRequest) return;
        cards = [];
        comparisonStatus = error.message || 'The gallery data could not be loaded.';
        render();
      }
    }

    function render() {
      if (comparisonStatus) {
        gallery.replaceChildren();
        const status = document.createElement('p');
        status.className = 'empty';
        status.textContent = comparisonStatus;
        gallery.append(status);
        return;
      }

      const filtered = cards.filter(card =>
        card.dataset.name.toLocaleLowerCase().includes(searchQuery));
      const sorted = [...filtered].sort(compareCards);
      gallery.replaceChildren();

      if (sorted.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'empty';
        empty.textContent = comparisonMode ? 'No games found outside your library.' : 'No games found.';
        gallery.append(empty);
        return;
      }

      if (!groupMode) {
        gallery.append(...sorted);
        return;
      }

      const dataKey = groupMode === 'year' ? 'year' : 'platform';
      const groups = [...new Set(sorted.map(card => card.dataset[dataKey]))];
      groups.sort((a, b) => groupMode === 'year'
        ? (a === 'Unknown' ? 1 : b === 'Unknown' ? -1 : Number(b) - Number(a))
        : a.localeCompare(b, undefined, { sensitivity: 'base' }));

      for (const group of groups) {
        const section = document.createElement('section');
        section.className = 'platform-group';
        const heading = document.createElement('h2');
        heading.textContent = group;
        const grid = document.createElement('div');
        grid.className = 'platform-grid';
        grid.append(...sorted.filter(card => card.dataset[dataKey] === group));
        section.append(heading, grid);
        gallery.append(section);
      }
    }

    document.querySelector('#sort-name').addEventListener('click', event => {
      sortDirection = sortKey === 'name' ? sortDirection * -1 : 1;
      sortKey = 'name';
      event.currentTarget.textContent = sortDirection === 1 ? 'Name: A-Z' : 'Name: Z-A';
      render();
    });

    document.querySelector('#sort-playtime').addEventListener('click', event => {
      sortDirection = sortKey === 'playtime' ? sortDirection * -1 : -1;
      sortKey = 'playtime';
      event.currentTarget.textContent = sortDirection === -1 ? 'Playtime: high-low' : 'Playtime: low-high';
      render();
    });

    function setGroupMode(mode) {
      groupMode = groupMode === mode ? null : mode;
      groupYear.setAttribute('aria-pressed', groupMode === 'year');
      groupPlatform.setAttribute('aria-pressed', groupMode === 'platform');
      groupYear.textContent = groupMode === 'year' ? 'Ungroup years' : 'Group by year';
      groupPlatform.textContent = groupMode === 'platform' ? 'Ungroup platforms' : 'Group by platform';
      render();
    }

    groupYear.addEventListener('click', () => setGroupMode('year'));
    groupPlatform.addEventListener('click', () => setGroupMode('platform'));

    document.querySelector('#sort-last-played').addEventListener('click', event => {
      sortDirection = sortKey === 'last-played' ? sortDirection * -1 : -1;
      sortKey = 'last-played';
      event.currentTarget.textContent = sortDirection === -1 ? 'Last played: recent' : 'Last played: oldest';
      render();
    });

    search.addEventListener('input', event => {
      const value = event.currentTarget.value.trim();
      clearSearch.classList.toggle('visible', event.currentTarget.value.length > 0);
      const galleryUrl = parseGalleryUrl(value);
      if (galleryUrl) {
        searchQuery = '';
        compareGallery(galleryUrl);
        return;
      }

      comparisonRequest++;
      comparisonMode = false;
      comparisonStatus = '';
      cards = localCards;
      searchQuery = value.toLocaleLowerCase();
      render();
    });

    clearSearch.addEventListener('click', () => {
      search.value = '';
      comparisonRequest++;
      comparisonMode = false;
      comparisonStatus = '';
      cards = localCards;
      searchQuery = '';
      clearSearch.classList.remove('visible');
      search.focus();
      render();
    });

    document.addEventListener('click', event => {
      const selected = event.target.closest('.cover');
      if (!selected) {
        cards.forEach(card => card.classList.remove('active', 'suppressed'));
        return;
      }
      const wasActive = selected.classList.contains('active');
      cards.forEach(card => card.classList.remove('active', 'suppressed'));
      selected.classList.add(wasActive ? 'suppressed' : 'active');
    });

    localCards.forEach(card => card.addEventListener('mouseleave', () => card.classList.remove('suppressed')));

    render();
  </script>
</body>
